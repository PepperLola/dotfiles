# vim:fileencoding=utf-8:foldmethod=marker

# VISUALS
font_size 12.0
force_ltr no
disable_ligatures never
# font_features FiraCodeNerdFontCompleteM-Regular +zero

background_opacity 0.9
background_blur 14

# tab_bar_style custom
# tab_separator ""
# tab_bar_edge top
# tab_bar_min_tabs 1
# tab_bar_margin_width 0.0
# tab_bar_margin_height 0.0 0.0
# tab_fade 0 0 0 0
# tab_title_template " {title[title.rindex('/')+1:] if '/' in title and title != '/' else title} "

# KEYBINDS
include keymaps.conf

# OTHER
enable_audio_bell no
macos_option_as_alt yes
notify_on_cmd_finish unfocused

startup_session startup.conf

allow_remote_control yes
listen_on unix:/tmp/mykitty

forward_stdio yes

cursor_trail 1
# shell /opt/homebrew/bin/nu
shell /opt/homebrew/bin/nu -c "zellij attach -c"

# BEGIN_KITTY_THEME
# Tokyo Night Moon
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family='FiraCode Nerd Font Mono' style=Retina
bold_font        family='FiraCode Nerd Font Mono' postscript_name=FiraCodeNerdFontCompleteM-Bold
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
